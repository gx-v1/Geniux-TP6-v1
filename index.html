<!DOCTYPE html>
<html>
<head>
  <title>Geniux-TP6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* Header */
    .header {
      background: #ff0000;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    /* Chat area */
    .chat-box {
      padding: 15px;
      height: 70vh;
      overflow-y: auto;
    }

    .user, .bot {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #1e1e1e;
      align-self: flex-end;
      text-align: right;
      margin-left: auto;
    }

    .bot {
      background: #2a2a2a;
      text-align: left;
    }

    /* Input area */
    .input-box {
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">Geniux-TP6</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">
  <input type="text" id="input" placeholder="Ask something...">
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let input = document.getElementById("input").value;
  if(input === "") return;

  let chat = document.getElementById("chat");

  // User message
  chat.innerHTML += `<div class="user">you: ${input}</div>`;

  // Fake AI reply
  setTimeout(() => {
    chat.innerHTML += `<div class="bot">GX: Hi I'm Geniux here, how can I help with you?</div>`;
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  document.getElementById("input").value = "";
}
</script>

</body>
</html>
