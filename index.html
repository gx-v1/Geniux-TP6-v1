<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>
<style>
body { margin:0; font-family:sans-serif; background:#343541; color:#ececf1; }
.container { display:flex; height:100vh; }
.sidebar { width:260px; background:#202123; padding:10px; display:flex; flex-direction:column; }
.main { flex:1; display:flex; flex-direction:column; }
.chat { flex:1; overflow-y:auto; padding:20px; }
.msg { display:flex; gap:10px; margin-bottom:15px; }
.input { display:flex; padding:10px; background:#40414f; }
textarea { flex:1; background:none; border:none; color:white; }
button { margin-left:5px; }
</style>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <button onclick="newChat()">+ New Chat</button>
    <div id="history" style="flex:1; overflow:auto;"></div>
    <button onclick="toggleTheme()">Theme</button>
  </div>

  <!-- Main -->
  <div class="main">

    <div style="padding:10px; border-bottom:1px solid #444;">
      <h3>AI Assistant</h3>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input">
      <textarea id="input" placeholder="Ask anything..."></textarea>
      <button onclick="send()">➤</button>
      <button onclick="voice()">🎤</button>
      <input type="file" accept="image/*" capture="environment" onchange="upload(event)">
    </div>

  </div>

</div>

<script>
const API_KEY = "YOUR_GEMINI_API_KEY";
const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

let messages = [];

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  messages.forEach(m => {
    chat.innerHTML += `
      <div class="msg">
        <div>${m.role==="user"?"🧑":"🤖"}</div>
        <div>${m.text}</div>
      </div>
    `;
  });
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  messages.push({role:"user", text});
  messages.push({role:"ai", text:"Thinking..."});
  input.value="";
  render();

  try {
    const res = await fetch(URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{role:"user", parts:[{text}]}]
      })
    });

    const data = await res.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No reply";

    messages[messages.length-1].text = reply;

    // voice output
    speechSynthesis.speak(new SpeechSynthesisUtterance(reply));

  } catch {
    messages[messages.length-1].text = "Error";
  }

  render();
}

function newChat() {
  messages = [];
  render();
}

function toggleTheme() {
  document.body.style.background =
    document.body.style.background === "white" ? "#343541" : "white";
}

function voice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Voice not supported");

  const rec = new SpeechRecognition();
  rec.start();
  rec.onresult = e => {
    document.getElementById("input").value = e.results[0][0].transcript;
  };
}

function upload(e) {
  messages.push({role:"user", text:"📷 Image uploaded"});
  render();
}
</script>

</body>
</html>
